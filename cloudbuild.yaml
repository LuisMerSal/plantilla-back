# =============================================================================
# Cloud Build - CI/CD Simplificado (rama main - ambiente desarrollo)
# =============================================================================
# Flujo: Tests → Build → Push → Deploy a Cloud Run (desarrollo controlado)
# =============================================================================

substitutions:
  _SERVICE_NAME: "service-databook-back-bo-cli-api"
  _REGION: "us-central1"
  _PROJECT_ID: "developer-486214"
  _REPO: "docker-repo-staging"

steps:
  # -----------------------------------------------------------------------------
  # 1️⃣ Tests
  # -----------------------------------------------------------------------------
  - id: test
    name: node:18.13.0-alpine
    entrypoint: sh
    args:
      - -c
      - |
        echo "🧪 Ejecutando tests..."
        # npm ci
        # npm test

  # -----------------------------------------------------------------------------
  # 2️⃣ Build Docker
  # -----------------------------------------------------------------------------
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: "back-databook/back"
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE_BASE="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}"

        echo "🏗️ Construyendo imagen ${SHORT_SHA}"

        docker build \
          -t $${IMAGE_BASE}:${SHORT_SHA} \
          -t $${IMAGE_BASE}:${BRANCH_NAME}-${SHORT_SHA} \
          -t $${IMAGE_BASE}:latest \
          .
    waitFor: ["test"]

  # -----------------------------------------------------------------------------
  # 3️⃣ Push a Artifact Registry
  # -----------------------------------------------------------------------------
  - id: push
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    dir: "back-databook/back"
    args:
      - -c
      - |
        IMAGE_BASE="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}"

        echo "📤 Haciendo push de imagen..."

        docker push $${IMAGE_BASE}:${SHORT_SHA}
        docker push $${IMAGE_BASE}:${BRANCH_NAME}-${SHORT_SHA}
        docker push $${IMAGE_BASE}:latest
    waitFor: ["build"]

  # -----------------------------------------------------------------------------
  # 4️⃣ Deploy a Cloud Run (desarrollo)
  # -----------------------------------------------------------------------------
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE_BASE="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}"

        echo "🚀 Deploy a Cloud Run (desarrollo)"

        gcloud run deploy ${_SERVICE_NAME}-dev \
          --image=$${IMAGE_BASE}:${SHORT_SHA} \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --platform=managed \
          --allow-unauthenticated
    waitFor: ["push"]

# -----------------------------------------------------------------------------
# Opciones globales
# -----------------------------------------------------------------------------
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: "1200s"

tags:
  - "${_SERVICE_NAME}-${BRANCH_NAME}"
  - "cloud-run"
